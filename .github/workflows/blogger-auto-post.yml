name: Blogger Auto Post (staywellgo.blogspot.com)

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10시 KST (UTC+9) - staywellgo.com과 시간 분산
    - cron: '0 13 * * *'  # 매일 오후 10시 KST
  workflow_dispatch:       # 수동 실행 가능

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Debug secret lengths
        run: |
          echo "CLIENT_ID length: ${#GOOGLE_CLIENT_ID}"
          echo "CLIENT_SECRET length: ${#GOOGLE_CLIENT_SECRET}"
          echo "REFRESH_TOKEN length: ${#GOOGLE_REFRESH_TOKEN}"
          echo "TOKEN prefix: ${GOOGLE_REFRESH_TOKEN:0:6}"
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

      - name: Run Blogger auto post
        run: node run-once-blogger.js
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
