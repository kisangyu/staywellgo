name: StayWellGo Auto Post

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 오전 8시 KST (UTC+9)
    - cron: '0 11 * * *'  # 매일 오후 8시 KST (UTC+9)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "WP_URL=${{ secrets.WP_URL }}" >> .env
          echo "WP_USERNAME=${{ secrets.WP_USERNAME }}" >> .env
          echo "WP_APP_PASSWORD=${{ secrets.WP_APP_PASSWORD }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "POSTS_PER_DAY=2" >> .env
          echo "POST_HOUR_1=8" >> .env
          echo "POST_HOUR_2=20" >> .env

      - name: Run auto post
        run: node run-once.js
