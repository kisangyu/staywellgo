name: Yukisang Auto Post

on:
  schedule:
    - cron: '30 23 * * *'  # 매일 오전 8시 30분 KST (UTC+9)
    - cron: '30 11 * * *'  # 매일 오후 8시 30분 KST (UTC+9)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run auto post
        run: node run-once-kr.js
        env:
          WP_URL: ${{ secrets.YK_WP_URL }}
          WP_USERNAME: ${{ secrets.YK_WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.YK_WP_APP_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          COUPANG_PARTNER_ID: ${{ secrets.COUPANG_PARTNER_ID }}
          POSTS_PER_DAY: 2
          POST_HOUR_1: 8
          POST_HOUR_2: 20
